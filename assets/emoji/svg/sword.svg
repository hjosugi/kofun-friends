<?xml version="1.0" encoding="UTF-8"?>
<!-- 鉄剣 (iron sword) emoji — kofun-friends -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="iron sword">
  <rect width="128" height="128" fill="none"/>
  <defs>
    <linearGradient id="iron" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cfd8dc"/>
      <stop offset="100%" stop-color="#78909c"/>
    </linearGradient>
  </defs>
  <!-- blade (diagonal) -->
  <path d="M30 98 L86 42 L94 50 L38 106 Z" fill="url(#iron)" stroke="#455a64" stroke-width="3" stroke-linejoin="round"/>
  <!-- tip -->
  <path d="M86 42 L98 34 L94 50 Z" fill="#eceff1" stroke="#455a64" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- guard -->
  <path d="M24 92 l18 18" stroke="#6d4c41" stroke-width="8" stroke-linecap="round"/>
  <!-- grip -->
  <path d="M30 98 l-12 12" stroke="#3e2723" stroke-width="9" stroke-linecap="round"/>
  <!-- pommel -->
  <circle cx="16" cy="112" r="5" fill="#a1887f" stroke="#3e2723" stroke-width="2"/>
</svg>
